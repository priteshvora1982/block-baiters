<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 440px; height: 280px; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  .banner {
    width: 440px; height: 280px;
    background: linear-gradient(135deg, #1E0A3C 0%, #0F172A 55%, #0C1A3A 100%);
    display: flex; align-items: center; justify-content: space-between;
    padding: 28px 30px; position: relative; overflow: hidden;
  }
  .banner::before {
    content: ''; position: absolute; top: -60px; left: -60px;
    width: 260px; height: 260px;
    background: radial-gradient(circle, rgba(124,58,237,0.3) 0%, transparent 70%);
  }
  .banner::after {
    content: ''; position: absolute; bottom: -60px; right: 80px;
    width: 220px; height: 220px;
    background: radial-gradient(circle, rgba(37,99,235,0.22) 0%, transparent 70%);
  }

  .left { z-index: 1; max-width: 210px; display: flex; flex-direction: column; gap: 10px; }

  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(124,58,237,0.25); border: 1px solid rgba(124,58,237,0.45);
    border-radius: 100px; padding: 3px 10px; width: fit-content;
    font-size: 9px; font-weight: 700; color: #A78BFA;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  h1 {
    font-size: 34px; font-weight: 800; line-height: 1.05;
    color: white; letter-spacing: -1px;
  }
  h1 span {
    background: linear-gradient(90deg, #A78BFA, #60A5FA);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .tagline { font-size: 11px; color: #94A3B8; line-height: 1.5; }
  .tagline strong { color: #E2E8F0; font-weight: 600; }
  .pill {
    background: linear-gradient(135deg, #7C3AED, #2563EB);
    border-radius: 100px; padding: 7px 14px;
    font-size: 10px; font-weight: 700; color: white;
    width: fit-content; letter-spacing: 0.02em;
  }

  .right { z-index: 1; display: flex; flex-direction: column; gap: 8px; width: 186px; }

  .feed-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; padding: 10px 12px;
    display: flex; align-items: flex-start; gap: 8px;
  }
  .feed-card.blocked { opacity: 0.32; position: relative; }
  .feed-card.clean {
    border-color: rgba(124,58,237,0.45);
    box-shadow: 0 0 0 1px rgba(124,58,237,0.25), 0 2px 16px rgba(124,58,237,0.18);
  }

  .avatar { width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; }
  .avatar-bait { background: linear-gradient(135deg, #94A3B8, #64748B); }
  .avatar-real { background: linear-gradient(135deg, #7C3AED, #2563EB); }

  .card-name { font-size: 8px; font-weight: 700; color: #CBD5E1; margin-bottom: 3px; }
  .card-text { font-size: 8px; color: #64748B; line-height: 1.45; }
  .card-text.real { color: #94A3B8; }

  .stamp {
    position: absolute; top: 50%; right: 10px;
    transform: translateY(-50%) rotate(-12deg);
    background: #FF3D57; border-radius: 4px;
    padding: 2px 7px; font-size: 8px; font-weight: 900;
    color: white; letter-spacing: 0.1em; text-transform: uppercase;
  }
  .divider { text-align: center; font-size: 8px; color: #334155; }
  .glow-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #7C3AED; flex-shrink: 0; margin-top: 3px;
    box-shadow: 0 0 5px rgba(124,58,237,0.9);
  }
</style>
</head>
<body>
<div class="banner">
  <div class="left">
    <div class="badge">🎣 Chrome Extension</div>
    <h1>Block<br/><span>Baiters.</span></h1>
    <p class="tagline"><strong>"Comment YES" crowd</strong><br/>has nowhere to hide.</p>
    <div class="pill">Not today, engagement farmer 🚜</div>
  </div>
  <div class="right">
    <div class="feed-card blocked">
      <div class="avatar avatar-bait"></div>
      <div class="card-body">
        <div class="card-name">Guru McInfluencer</div>
        <div class="card-text">Comment "YES" for my FREE 47-step morning routine PDF 🔥🔥</div>
      </div>
      <div class="stamp">Blocked 🎣</div>
    </div>
    <div class="divider">↓ reel it in ↓</div>
    <div class="feed-card clean">
      <div class="glow-dot"></div>
      <div class="avatar avatar-real"></div>
      <div class="card-body">
        <div class="card-name">Actually worth reading</div>
        <div class="card-text real">Talk to your users every single week. The signal degrades fast.</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
