<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Block Baiters</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">🚫</div>
      <div class="title-group">
        <h1>Block Baiters</h1>
        <p class="subtitle">reclaim your feed 🎣</p>
      </div>
      <label class="toggle" title="Enable / disable">
        <input type="checkbox" id="enabledToggle" />
        <span class="toggle__track"></span>
      </label>
    </header>

    <section class="stats" id="statsSection">
      <div class="stat">
        <span class="stat__number" id="filteredCount">0</span>
        <span class="stat__label">baiters blocked 🎣</span>
      </div>
    </section>

    <section class="settings">
      <label class="setting-label" for="sensitivitySelect">Sensitivity</label>
      <div class="sensitivity-group" id="sensitivityGroup">
        <button class="sens-btn" data-value="loose">Loose</button>
        <button class="sens-btn" data-value="moderate">Moderate</button>
        <button class="sens-btn" data-value="strict">Strict</button>
      </div>
      <p class="sensitivity-hint" id="sensitivityHint"></p>
    </section>

    <footer>
      <button class="reset-btn" id="resetBtn">Reset count</button>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
